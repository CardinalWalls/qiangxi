<!doctype html>
<!--
  我是什么：《裁了吗》网页版，但模型是【在浏览器里本地运行的 Qwen】(WebLLM + WebGPU)，不连服务器。
            它真实满足赛事 05 要求：① 模型本地加载过程(有真实进度条) ② 推理输入输出(HR 的话是本地模型当场生成)
            ③ 核心交互流程(开麦/打字 → HR 逼问 → 出声)。不是脚本动效。
  什么时候用我：录 05 演示视频时——用这台 mac 的 Chrome 打开 http://localhost:8000/裁了吗-浏览器本地模型版-录视频用.html
            （localhost 是安全上下文，WebGPU 和麦克风才可用），点「加载本地模型」录下加载过程，再「接通」对戏。
  注意：WebGPU 需要 Chrome 113+ 且安全上下文(localhost 或 https)。手机录制需把本文件部署到 https。
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>裁了吗 · 浏览器本地模型版</title>
<style>
  :root{--bg:#0b0e14;--panel:#161b22;--line:#2a2f3a;--txt:#c9d1d9;--dim:#8b949e;
        --green:#3fb950;--yellow:#d29922;--red:#f85149;--accent:#58a6ff;--pink:#db61a2;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1000px 500px at 50% -10%,rgba(88,166,255,.10),transparent),var(--bg);
       color:var(--txt);font:16px/1.6 -apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif}
  .wrap{max-width:680px;margin:0 auto;padding:18px 16px 60px}
  h1{font-size:24px;margin:6px 0 2px}
  h1 .g{background:linear-gradient(90deg,#58a6ff,#db61a2);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--dim);font-size:13.5px;margin-bottom:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  select,input,button{font:inherit}
  select,input[type=text]{background:#0c1018;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px 11px;outline:none}
  input[type=text]{flex:1;min-width:120px}
  button{border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
  .b-go{background:linear-gradient(90deg,#58a6ff,#db61a2);color:#0b0e14}
  .b-call{background:var(--red);color:#fff}
  .b-ghost{background:#0c1018;border:1px solid var(--line);color:var(--dim)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .mic{width:48px;height:48px;border-radius:50%;background:#0c1018;border:1px solid var(--line);color:var(--accent);font-size:19px;flex:none}
  .mic.live{background:#2a0f12;border-color:var(--red);color:var(--red);animation:pm 1.1s infinite}
  @keyframes pm{50%{box-shadow:0 0 0 9px rgba(248,81,73,.07)}}
  .plabel{font-size:12px;color:var(--dim);margin-bottom:7px}
  .pbar{height:9px;border-radius:6px;background:#0c1018;border:1px solid var(--line);overflow:hidden}
  .pbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#58a6ff,#3fb950);transition:width .2s}
  .ptext{font:11.5px/1.5 ui-monospace,Menlo,monospace;color:var(--dim);margin-top:7px;max-height:46px;overflow:hidden}
  .chat{min-height:230px;display:flex;flex-direction:column;gap:10px;padding:4px 2px}
  .msg{max-width:86%;padding:10px 13px;border-radius:14px;font-size:15px;line-height:1.7;white-space:pre-wrap}
  .hr{align-self:flex-start;background:#1c2230;border:1px solid var(--line);border-top-left-radius:4px}
  .you{align-self:flex-end;background:#15233a;border:1px solid #244;border-top-right-radius:4px;color:#dbe9ff}
  .who{font-size:11px;color:var(--dim);margin:0 4px 2px}
  .director{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
  .dbox{background:#0c1018;border:1px solid var(--line);border-radius:10px;padding:10px}
  .dbox .k{font-size:11px;color:var(--accent);letter-spacing:.05em}
  .dbox .v{font-size:14px;margin-top:3px}
  .hud{font:11.5px/1.5 ui-monospace,Menlo,monospace;color:var(--dim);margin-top:8px}
  .hud b{color:var(--green)}
  .tip{color:var(--dim);font-size:12px;margin-top:8px}
  .err{color:var(--red);font-size:13px;margin-top:8px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="wrap">
  <h1>裁了吗 · <span class="g">浏览器本地模型版</span></h1>
  <div class="sub">对面是一个冷面 HR，会用话术一步步逼你当场让步。模型 <b>在你浏览器里本地运行（Qwen · WebGPU）</b>，不连服务器。开麦或打字，练习守住你的合法权益。</div>

  <!-- 1) 模型本地加载 -->
  <div class="card">
    <div class="plabel">① 模型本地加载（端侧 · 浏览器内 WebGPU）</div>
    <div class="row" style="margin-bottom:10px">
      <select id="model"></select>
      <button class="b-go" id="load">▸ 加载本地模型</button>
      <span id="webgpu" style="font-size:12px;color:var(--dim)"></span>
    </div>
    <div class="pbar"><i id="bar"></i></div>
    <div class="ptext" id="ptext">尚未加载。点「加载本地模型」开始把 Qwen 下载到浏览器并在本机 GPU 上初始化。</div>
    <div class="err" id="err"></div>
  </div>

  <!-- 2) 对戏 -->
  <div class="card">
    <div class="row" style="margin-bottom:10px">
      <button class="b-call" id="call" disabled>📞 接通电话</button>
      <button class="b-ghost" id="hang" disabled>挂断</button>
      <span id="status" style="font-size:12px;color:var(--dim)">未连接</span>
    </div>
    <div class="chat" id="chat">
      <div class="tip">先加载本地模型，再点「接通电话」，HR 会先开口。</div>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="mic" id="mic" title="按一下说话" disabled>🎙</button>
      <input type="text" id="text" placeholder="打字回应 HR…（或按麦克风说）" disabled/>
      <button class="b-go" id="send" disabled>发送</button>
    </div>
    <div class="director">
      <div class="dbox"><div class="k">HR 当前招式</div><div class="v" id="dTactic">—</div></div>
      <div class="dbox"><div class="k">谈话阶段</div><div class="v" id="dStage">—</div></div>
    </div>
    <div class="hud" id="hud"></div>
    <div class="tip">建议用 Chrome。麦克风需 localhost 或 https；点麦没反应就直接打字。每轮 HR 的话都是本地模型当场生成。</div>
  </div>
</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";
const $=id=>document.getElementById(id);

/* ---- 选模型：从 WebLLM 预置列表里挑 Qwen2.5（小的优先，方便录加载） ---- */
const qwens=(webllm.prebuiltAppConfig?.model_list||[])
  .map(m=>m.model_id).filter(id=>/Qwen2\.5-(0\.5B|1\.5B|3B)-Instruct/.test(id));
const pref=qwens.find(id=>/0\.5B/.test(id))||qwens.find(id=>/1\.5B/.test(id))||qwens[0];
for(const id of (qwens.length?qwens:["(无可用 Qwen，可能需要更新 WebLLM)"])){
  const o=document.createElement("option");o.value=id;o.textContent=id;if(id===pref)o.selected=true;$("model").appendChild(o);
}
$("webgpu").textContent = (navigator.gpu? "WebGPU ✓" : "本浏览器无 WebGPU，请用 Chrome113+/安全上下文");

let engine=null, history=[], busy=false;
const SYS={role:"system",content:
  "你扮演「裁了吗」陪练里的 HR，正在跟一名员工做裁员谈话。你冷静、专业、带压迫感，"+
  "会用话术一步步逼对方当场让步或低价签字，比如：公司决定已定/这是对大家都好/今天签有额外一个月/不签走流程对你不利/名额有限别错过。"+
  "每次只说 1~2 句，像真人打电话，口语、能被念出来。只说 HR 的话，不要旁白、不要解说、不要替员工说话。"};

/* ---- 加载本地模型（真实进度） ---- */
$("load").onclick=async()=>{
  const id=$("model").value;$("err").textContent="";
  if(!navigator.gpu){$("err").textContent="这个浏览器没有 WebGPU。请用 Chrome 113+ 且通过 localhost 或 https 打开。";return;}
  $("load").disabled=true;$("model").disabled=true;
  try{
    engine=await webllm.CreateMLCEngine(id,{initProgressCallback:r=>{
      const pct=Math.round((r.progress||0)*100);$("bar").style.width=pct+"%";
      $("ptext").textContent=`[${pct}%] ${r.text||""}`;}});
    $("bar").style.width="100%";$("ptext").textContent="✓ 本地模型已就绪："+id+"（运行在你的 GPU 上，不连服务器）";
    $("call").disabled=false;
  }catch(e){$("err").textContent="加载失败："+(e?.message||e)+"\n（多为网络中断或显存不足，可换更小的 0.5B 重试）";
    $("load").disabled=false;$("model").disabled=false;}
};

/* ---- 一轮：把用户输入喂给本地模型，流式拿 HR 回应 ---- */
function addMsg(cls,who,text){const w=document.createElement("div");w.innerHTML=`<div class="who">${who}</div>`;
  const m=document.createElement("div");m.className="msg "+cls;m.textContent=text;w.appendChild(m);
  $("chat").appendChild(w);$("chat").scrollTop=$("chat").scrollHeight;return m;}
let synth=null;
function speak(t){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang="zh-CN";u.rate=1.0;u.pitch=.9;
  const vs=speechSynthesis.getVoices();const zh=vs.find(v=>/zh|Chinese/i.test(v.lang+v.name));if(zh)u.voice=zh;
  speechSynthesis.speak(u);}
const TACTICS=[["既定事实","公司|决定|已定|没得商量"],["利诱速签","今天签|额外|名额|别错过|多给"],
  ["施压威胁","流程|对你不利|没好处|拖"],["情感绑架","为大家|理解|难处|换位"],["低球赔偿","N|赔偿|标准|就这些"]];
function guessTactic(t){for(const[name,re]of TACTICS)if(new RegExp(re).test(t))return name;return "试探/铺垫";}

async function turn(userText){
  if(!engine||busy)return;busy=true;$("send").disabled=true;$("text").disabled=true;
  if(userText){history.push({role:"user",content:userText});addMsg("you","你",userText);}
  $("dStage").textContent=`第 ${Math.ceil((history.filter(m=>m.role==='assistant').length+1))} 回合`;
  const hrEl=addMsg("hr","HR","");let full="";const t0=performance.now();let ft=0,n=0;
  try{
    const stream=await engine.chat.completions.create({messages:[SYS,...history],stream:true,temperature:0.8,max_tokens:160});
    for await(const c of stream){const d=c.choices[0]?.delta?.content||"";if(d){if(!ft)ft=performance.now();full+=d;n++;hrEl.textContent=full;$("chat").scrollTop=$("chat").scrollHeight;}}
  }catch(e){hrEl.textContent="(本地推理出错："+(e?.message||e)+")";}
  history.push({role:"assistant",content:full});
  const dt=(performance.now()-(ft||t0))/1000;
  $("dTactic").textContent=guessTactic(full);
  $("hud").innerHTML=`本地推理 · 首字 ${Math.round((ft-t0)||0)}ms · 生成 ${n} 块 / ${dt.toFixed(2)}s · <b>${(n/Math.max(dt,.001)).toFixed(1)} tok/s</b> · 设备 GPU`;
  speak(full);
  busy=false;$("send").disabled=false;$("text").disabled=false;$("text").focus();
}

$("call").onclick=async()=>{
  $("chat").innerHTML="";history=[];$("status").textContent="通话中…（本地模型）";
  $("call").disabled=true;$("hang").disabled=false;$("mic").disabled=false;$("text").disabled=false;$("send").disabled=false;
  history.push({role:"user",content:"（员工接通了电话）"});
  await turn(null);
};
$("hang").onclick=()=>{if('speechSynthesis'in window)speechSynthesis.cancel();
  $("status").textContent="已挂断";$("call").disabled=false;$("hang").disabled=true;
  $("mic").disabled=true;$("text").disabled=true;$("send").disabled=true;};
$("send").onclick=()=>{const v=$("text").value.trim();if(v){$("text").value="";turn(v);}};
$("text").addEventListener("keydown",e=>{if(e.key==="Enter")$("send").click();});

/* ---- 语音输入 ---- */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
$("mic").onclick=()=>{if(!SR){alert("此浏览器不支持语音识别，请用 Chrome 并通过 localhost/https 打开；可直接打字。");return;}
  const rec=new SR();rec.lang="zh-CN";rec.interimResults=true;$("mic").classList.add("live");
  rec.onresult=e=>{let t="";for(const r of e.results)t+=r[0].transcript;$("text").value=t;
    if(e.results[e.results.length-1].isFinal){$("mic").classList.remove("live");$("send").click();}};
  rec.onend=()=>$("mic").classList.remove("live");rec.onerror=()=>$("mic").classList.remove("live");
  try{rec.start();}catch(_){}}
</script>
</body>
</html>
